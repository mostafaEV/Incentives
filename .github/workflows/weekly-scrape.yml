name: Weekly CAPEX incentive scrape

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py --sources vfd federal pace greenbanks demand water

      - name: Convert DB to JSON for dashboard
        run: |
          python3 << 'EOF'
          import sqlite3, json, datetime, os

          conn = sqlite3.connect("incentives.db")
          conn.row_factory = sqlite3.Row
          rows = conn.execute("""
              SELECT name, org,
                     program_type as type,
                     capex_category as cat,
                     state, equipment as equip_json,
                     incentive_amount as amt,
                     incentive_type as itype,
                     max_incentive as max,
                     deadline,
                     eligible_sectors as sector,
                     stacking_allowed as stack,
                     source_url as url,
                     notes, qa_status
              FROM programs ORDER BY capex_category, state, name
          """).fetchall()

          programs = []
          for r in rows:
              p = dict(r)
              try:
                  p['equip'] = json.loads(p.pop('equip_json') or '[]')
              except:
                  p['equip'] = []
              programs.append(p)

          output = {
              "metadata": {
                  "last_updated": datetime.datetime.utcnow().isoformat() + "Z",
                  "total_programs": len(programs),
                  "source": "live_scraper"
              },
              "programs": programs
          }
          with open("capex_incentives.json", "w") as f:
              json.dump(output, f, indent=2)
          print(f"Exported {len(programs)} programs")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capex_incentives.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Weekly refresh $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
