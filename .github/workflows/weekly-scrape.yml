name: Weekly CAPEX incentive scrape

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py --sources dsire federal states pace greenbanks demand water

      - name: Copy JSON to root
        run: find . -name "capex_incentives.json" 2>/dev/null || echo "JSON not found"$

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capex_incentives.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Weekly refresh $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
